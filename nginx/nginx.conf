events {
    worker_connections 128;
}

http {
    # ── 基础配置 ──
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 2m;

    # ── 限流：防止抓爆小龙虾 ──
    limit_req_zone $binary_remote_addr zone=api:1m rate=10r/s;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── HTTP → HTTPS 重定向（有证书时启用） ──
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     location /.well-known/acme-challenge/ {
    #         root /var/www/certbot;
    #     }
    #     location / {
    #         return 301 https://$host$request_uri;
    #     }
    # }

    # ── 主服务（HTTP，初始用这个） ──
    server {
        listen 80;
        server_name _;

        # Let's Encrypt 验证路径
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Basic Auth 保护整个站
        auth_basic "PulseFeed 🦞";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # GPT Actions API（不需要 Basic Auth，用自己的 Bearer token 验证）
        location /api/gpt/ {
            auth_basic off;
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://pulsefeed:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS for GPT Actions
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
                add_header 'Content-Length' '0';
                return 204;
            }
        }

        # 其他 API 限流
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://pulsefeed:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 前端
        location / {
            proxy_pass http://pulsefeed:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS 版本（获取证书后取消注释） ──
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/certs/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/live/your-domain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #
    #     auth_basic "PulseFeed 🦞";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #
    #     location /api/ {
    #         limit_req zone=api burst=20 nodelay;
    #         proxy_pass http://pulsefeed:3000;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #
    #     location / {
    #         proxy_pass http://pulsefeed:3000;
    #         proxy_set_header Host $host;
